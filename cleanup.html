<!DOCTYPE html>
<html>
<head>
  <title>Cleaning old cache...</title>
</head>
<body>
  <h1>Cleaning up, please wait...</h1>
  <script>
    (async function() {
      // 1. Unregister all service workers for this domain
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (const reg of registrations) {
          await reg.unregister();
        }
      }
      // 2. Delete all cache storage
      const keys = await caches.keys();
      await Promise.all(keys.map(key => caches.delete(key)));
      // 3. Redirect to main page with a random query to break cache
      window.location.href = './?cleaned=' + Date.now();
    })();
  </script>
</body>
</html>
